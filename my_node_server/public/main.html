<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>川野邊研究室 // 研究テーマ発表会</title>
        
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
        
        <style>
            /* ------------------------------------------- */
            /* 全体スタイル：パララックス背景とモダンデザイン */
            /* ------------------------------------------- */
            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                overflow-x: hidden;
                
                /* 美しいグラデーション背景 */
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                background-attachment: fixed;
                
                /* アニメーション背景パターン */
                position: relative;
            }
            
            /* アニメーション背景パターン */
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                            radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                            radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
                animation: backgroundMove 20s ease-in-out infinite;
                z-index: -1;
            }
            
            @keyframes backgroundMove {
                0%, 100% { transform: translate(0, 0) rotate(0deg); }
                33% { transform: translate(30px, -30px) rotate(120deg); }
                66% { transform: translate(-20px, 20px) rotate(240deg); }
            }

            /* ★★★ コンテンツラッパー：背景の上に重ねてスクロールさせる ★★★ */
            .content-wrapper {
                /* ガラスモーフィズム効果 */
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                min-height: 200vh;
                padding: 80px 40px;
                color: #ffffff;
                text-align: center;
                position: relative;
                z-index: 1;
                /* モダンフォント */
                font-family: 'Inter', 'Helvetica Neue', 'Arial', 'Noto Sans JP', sans-serif; 
            }


            /* ------------------------------------------- */
            /* ヘッディング＆タイピングアニメーション */
            /* ------------------------------------------- */
            h1 {
                font-size: 3.2em;
                color: #ffffff;
                font-weight: 800;
                letter-spacing: 2px;
                margin-bottom: 20px;
                margin-top: 0;
                text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                animation: titleGlow 3s ease-in-out infinite alternate;
            }
            
            @keyframes titleGlow {
                from { text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), 0 0 30px rgba(255, 255, 255, 0.1); }
                to { text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 255, 255, 0.3); }
            }

            #main-typing-container {
                min-height: 40px;
                margin-bottom: 80px;
                padding: 20px;
                border-radius: 15px;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                display: inline-block;
            }

            h2 {
                font-size: 1.6em;
                color: rgba(255, 255, 255, 0.9);
                font-weight: 400;
                margin: 0;
                display: inline;
                text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            }

            /* iTypedカーソルスタイル */
            .ityped-cursor {
                font-size: 1.6em;
                opacity: 1;
                animation: blink 0.7s infinite;
                color: #00d4ff;
                text-shadow: 0 0 10px #00d4ff;
            }
            @keyframes blink {
                0% { opacity: 1; }
                50% { opacity: 0; }
                100% { opacity: 1; }
            }

            /* ------------------------------------------- */
            /* レイアウト調整：ボタン間隔と整列 */
            /* ------------------------------------------- */

            /* ------------------------------------------- */
            /* ボタンリンク：モダン＆ミニマルデザイン (サイズ統一) */
            /* ------------------------------------------- */
            .button-link {
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                
                margin: 25px;
                
                /* サイズを固定 */
                min-width: 380px; 
                height: 160px;
                
                /* モダンなガラスモーフィズムボタン */
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 20px;
                
                color: #ffffff;
                text-decoration: none;
                cursor: pointer;
                font-size: 1.3em;
                font-weight: 600;
                letter-spacing: 0.8px;
                text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
                
                /* アニメーション設定 */
                transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
                position: relative;
                overflow: hidden;
            }
            
            /* ボタンホバーエフェクト */
            .button-link::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                transition: left 0.5s;
            }
            
            .button-link:hover::before {
                left: 100%;
            }

            .button-link:hover {
                background: rgba(255, 255, 255, 0.25);
                border-color: rgba(255, 255, 255, 0.4);
                
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.1);
                transform: translateY(-8px) scale(1.02);
            }
            
            /* ボタンクリックエフェクト */
            .button-link:active {
                transform: translateY(-4px) scale(0.98);
                transition: all 0.1s;
            }
            
            /* スクロール時の視覚効果 */
            .theme-links {
                display: flex;
                flex-wrap: wrap; 
                justify-content: center; 
                max-width: 1400px; 
                margin: 0 auto;
                padding: 40px 0;
            }
            
            /* ページロード時のフェードイン効果 */
            .content-wrapper {
                animation: fadeInUp 1s ease-out;
            }
            
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>
        <div class="content-wrapper">
            <h1>川野邊研究室 // 研究テーマ発表会</h1>
            
            <div id="main-typing-container">
                <h2 id="main-typing"></h2>
            </div>
            
            <div style="margin-top: 50vh;">
                <div class="theme-links">
                    <a href="soccer.html" class="button-link" data-aos="fade-up" data-aos-delay="0">テーマ01：AIによるデータ分析プロトコル</a>
                    <a href="Axe.html" class="button-link" data-aos="fade-up" data-aos-delay="100">テーマ02：データ統合と可視化技術</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="100">test</a>
                    
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="200">テーマ03：次世代通信技術の研究</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="300">テーマ04：量子コンピューティング応用</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="400">テーマ05：拡張現実(AR)システムの開発</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="500">テーマ06：深層学習モデルの効率化</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="600">テーマ07：ドローン群制御システム</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="700">テーマ08：バイオインフォマティクス解析</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="800">テーマ09：スマートシティの最適化</a>
                    <a href="#" class="button-link" data-aos="fade-up" data-aos-delay="900">テーマ10：自律型ロボットの行動計画</a>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/ityped@1.0.0/dist/index.js"></script>
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

        <script>
            window.onload = function() {
                // iTyped 初期化 (1分間停止設定を含む)
                const strings = [
                    "// 研究テーマの選択を待機しています。テーマを選択してください。",
                ];

                ityped.init(document.querySelector("#main-typing"), {
                    strings: strings,
                    loop: true,
                    typeSpeed: 80,
                    backSpeed: 40,
                    backDelay: 60000, // 1分間 (60000ms) 停止
                    startDelay: 500,
                    showCursor: true
                });

                // AOS 初期化
                AOS.init({
                    once: true,
                    easing: 'ease-out-back',
                    duration: 1000 
                });
            }
        </script>
    </body>
</html>
